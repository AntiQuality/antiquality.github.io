<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .construction-icon {
            font-size: 80px;
            margin: 30px 0;
            color: #f39c12;
        }
        .progress-bar {
            background-color: #eee;
            height: 30px;
            border-radius: 15px;
            margin: 30px 0;
            overflow: hidden;
        }
        .progress {
            background-color: #3498db;
            width: 30%;
            height: 100%;
            border-radius: 15px;
            animation: progress-animation 2s ease-in-out infinite alternate;
        }
        @keyframes progress-animation {
            from { width: 25%; }
            to { width: 35%; }
        }
        .contact {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Under Construction</h1>
        <div class="construction-icon">🚧</div>
        <p>I'm currently working on something awesome!</p>
        <p>My website is being built and will be available soon.</p>
        
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        
        <p>Thank you for your patience.</p>
        <p>Please check back soon for updates.</p>
        
    </div>
</body>
</html>
